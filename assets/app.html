  /* \u2500\u2500 Keyframes \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(18px) scale(0.97); }
    to   { opacity:1; transform:translateY(0)    scale(1);    }
  }
  @keyframes fadeIn  { from{opacity:0} to{opacity:1} }
  @keyframes slideUp {
    from { opacity:0; transform:translateY(32px); }
    to   { opacity:1; transform:translateY(0);    }
  }
  @keyframes slideDown {
    from { opacity:0; transform:translateY(-16px); }
    to   { opacity:1; transform:translateY(0);     }
  }
  @keyframes scaleIn {
    from { opacity:0; transform:scale(0.82); }
    to   { opacity:1; transform:scale(1);    }
  }
  @keyframes scaleInBounce {
    0%   { opacity:0; transform:scale(0.7);  }
    60%  { opacity:1; transform:scale(1.07); }
    80%  {            transform:scale(0.97); }
    100% {            transform:scale(1);    }
  }
  @keyframes popIn {
    0%   { opacity:0; transform:scale(0.5) rotate(-8deg);  }
    60%  { opacity:1; transform:scale(1.15) rotate(2deg);  }
    100% {            transform:scale(1) rotate(0deg);     }
  }
  @keyframes sheetUp {
    from { opacity:0.4; transform:translateY(100%); }
    to   { opacity:1;   transform:translateY(0);    }
  }
  @keyframes overlayIn { from{opacity:0} to{opacity:1} }
  @keyframes shimmer {
    0%   { background-position:-400px 0; }
    100% { background-position: 400px 0; }
  }
  @keyframes pulse {
    0%,100% { opacity:1;   transform:scale(1);    }
    50%      { opacity:0.6; transform:scale(0.94); }
  }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes ripple {
    from { transform:scale(0);   opacity:0.4; }
    to   { transform:scale(2.8); opacity:0;   }
  }
  @keyframes barGrow   { from{transform:scaleX(0)} to{transform:scaleX(1)} }
  @keyframes numberRoll {
    from { opacity:0; transform:translateY(8px); }
    to   { opacity:1; transform:translateY(0);   }
  }
  @keyframes glowPulse {
    0%,100% { box-shadow:0 0 0 0 transparent; }
    50%      { box-shadow:0 0 22px 5px var(--glow-color,#00E67640); }
  }
  @keyframes tabIndicator {
    from { opacity:0; transform:scaleX(0.4); }
    to   { opacity:1; transform:scaleX(1);   }
  }
  @keyframes calDayIn {
    from { opacity:0; transform:scale(0.6); }
    to   { opacity:1; transform:scale(1);   }
  }
  @keyframes checkmark {
    0%   { stroke-dashoffset:30; opacity:0; }
    50%  { opacity:1; }
    100% { stroke-dashoffset:0;  opacity:1; }
  }
  @keyframes floatBadge {
    0%,100% { transform:translateY(0);    }
    50%      { transform:translateY(-3px); }
  }
  /* \u2500\u2500 Liquid Glass Keyframes \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
  @keyframes liquidShimmer {
    0%   { background-position:-200% center; }
    100% { background-position: 200% center; }
  }
  @keyframes orbFloat {
    0%,100% { transform:translate(0,0) scale(1);         }
    33%      { transform:translate(18px,-22px) scale(1.06); }
    66%      { transform:translate(-14px,12px) scale(0.96); }
  }
  @keyframes orbFloat2 {
    0%,100% { transform:translate(0,0) scale(1);          }
    40%      { transform:translate(-20px,16px) scale(1.08); }
    70%      { transform:translate(12px,-18px) scale(0.94); }
  }
  @keyframes glassGlow {
    0%,100% { opacity:0.5; }
    50%      { opacity:1;   }
  }
  @keyframes borderGlow {
    0%,100% { border-color: rgba(255,255,255,0.15); }
    50%      { border-color: rgba(255,255,255,0.38); }
  }

  /* \u2500\u2500 Base \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
  * { -webkit-tap-highlight-color:transparent; box-sizing:border-box; }

  /* \u2500\u2500 Pressable + Ripple \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
  .pressable {
    transition: transform 0.13s cubic-bezier(.4,0,.2,1), opacity 0.13s, box-shadow 0.13s;
    -webkit-user-select:none; user-select:none;
  }
  .pressable:active { transform:scale(0.94)!important; opacity:0.84!important; }

  /* \u2500\u2500 Liquid Glass Card \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
  .lg-card {
    position: relative;
    backdrop-filter: blur(32px) saturate(200%) brightness(1.08);
    -webkit-backdrop-filter: blur(32px) saturate(200%) brightness(1.08);
    border-radius: 22px;
    overflow: hidden;
    isolation: isolate;
    transition: transform 0.22s cubic-bezier(.4,0,.2,1),
                box-shadow 0.22s,
                border-color 0.22s;
  }
  /* noise texture overlay for glass */
  .lg-card::before {
    content:'';
    position:absolute; inset:0; z-index:0; pointer-events:none;
    border-radius: inherit;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.35;
  }
  /* shimmer highlight */
  .lg-card::after {
    content:'';
    position:absolute; inset:0; z-index:1; pointer-events:none;
    border-radius: inherit;
    background: linear-gradient(
      135deg,
      rgba(255,255,255,0.18) 0%,
      rgba(255,255,255,0.04) 40%,
      rgba(255,255,255,0.00) 60%,
      rgba(255,255,255,0.08) 100%
    );
  }
  .lg-card > * { position:relative; z-index:2; }

  /* \u2500\u2500 Liquid Glass Button \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
  .lg-btn {
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-radius: 14px;
    transition: transform 0.13s, box-shadow 0.13s, background 0.18s;
    position: relative;
    overflow: hidden;
    isolation: isolate;
  }
  .lg-btn::after {
    content:'';
    position:absolute; inset:0; pointer-events:none;
    border-radius:inherit;
    background: linear-gradient(135deg, rgba(255,255,255,0.22) 0%, transparent 60%);
    opacity:0.7;
  }
  .lg-btn:active { transform:scale(0.94); }

  /* \u2500\u2500 Liquid Glass Sheet / Modal \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
  .lg-sheet {
    backdrop-filter: blur(48px) saturate(220%) brightness(1.05);
    -webkit-backdrop-filter: blur(48px) saturate(220%) brightness(1.05);
    border-radius: 28px 28px 0 0;
    position: relative;
    overflow: hidden;
    isolation: isolate;
  }
  .lg-sheet::before {
    content:'';
    position:absolute; top:0; left:0; right:0; height:1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
    z-index:10;
  }
  .lg-sheet::after {
    content:'';
    position:absolute; inset:0; pointer-events:none; z-index:0;
    background: linear-gradient(
      180deg,
      rgba(255,255,255,0.10) 0%,
      rgba(255,255,255,0.02) 100%
    );
  }
  .lg-sheet > * { position:relative; z-index:2; }

  /* \u2500\u2500 Liquid Glass Overlay (modal backdrop) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
  .lg-overlay {
    backdrop-filter: blur(28px) saturate(160%);
    -webkit-backdrop-filter: blur(28px) saturate(160%);
  }

  /* \u2500\u2500 Liquid Glass Input \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
  .lg-input {
    backdrop-filter: blur(16px) saturate(160%);
    -webkit-backdrop-filter: blur(16px) saturate(160%);
    transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
    border-radius: 12px;
  }
  .lg-input:focus {
    outline: none;
    box-shadow: 0 0 0 3px var(--focus-ring, rgba(0,230,118,0.25)) !important;
  }

  /* \u2500\u2500 Nav Bar Glass \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
  .lg-navbar {
    backdrop-filter: saturate(220%) blur(36px) brightness(1.06);
    -webkit-backdrop-filter: saturate(220%) blur(36px) brightness(1.06);
  }

  /* \u2500\u2500 Ambient Orb \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
  .lg-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(70px);
    pointer-events: none;
    will-change: transform;
  }
  .lg-orb-1 { animation: orbFloat  14s ease-in-out infinite; }
  .lg-orb-2 { animation: orbFloat2 18s ease-in-out infinite; }
  .lg-orb-3 { animation: orbFloat  22s ease-in-out infinite reverse; }

  /* \u2500\u2500 Card hover glow \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
  .card-hover {
    transition: transform 0.2s cubic-bezier(.4,0,.2,1), box-shadow 0.2s;
  }
  .card-hover:active { transform:scale(0.97); }

  /* \u2500\u2500 Inputs global \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
  input, textarea, select {
    transition: border-color 0.18s, box-shadow 0.18s;
  }
  input:focus, textarea:focus {
    box-shadow: 0 0 0 3px var(--focus-ring, rgba(0,230,118,0.22)) !important;
  }
